# ============================================
# mcp.envest.com.tr - Mevcut Nginx'e eklenecek server block
# ============================================
# Bu dosyayi sunucudaki Nginx'e kopyala:
#   sudo cp mcp.envest.com.tr.conf /etc/nginx/sites-available/mcp.envest.com.tr
#   sudo ln -s /etc/nginx/sites-available/mcp.envest.com.tr /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL: Cloudflare Full (Strict) modunda Origin Certificate kullanilir.
# Cloudflare Flexible modunda SSL blogu gerekli degil, sadece 80 portunu dinle.

server {
    listen 80;
    server_name mcp.envest.com.tr;

    # Cloudflare Flexible mod icin direkt proxy (Cloudflare edge'de SSL yapar)
    # Cloudflare Full/Strict modunda asagidaki 443 blogunu kullan, burada redirect yap:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;

        # SSE / Streaming icin zorunlu
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standart proxy headerlari
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Authorization header ilet
        proxy_set_header Authorization $http_authorization;

        # Uzun sureli sorgular (pompa hesabi, SCADA sorgu)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }
}

