# ============================================
# Envest MCP Server - Nginx Configuration
# ============================================
# Tek Python sunucu, tek port. Instance ayirimi JWT token ile.
# SCADA token -> SCADA tools, KoruCAPS token -> KoruCAPS tools.

upstream mcp_server {
    server mcp-server:8001;
}

# --- HTTP -> HTTPS Redirect ---
server {
    listen 80;
    server_name mcp.envest.com.tr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS Server ---
server {
    listen 443 ssl http2;
    server_name mcp.envest.com.tr;

    # =============================================
    # SSL SECENEGI 1: Cloudflare Origin Certificate
    # =============================================
    ssl_certificate /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    # =============================================
    # SSL SECENEGI 2: Let's Encrypt
    # =============================================
    # ssl_certificate /etc/letsencrypt/live/mcp.envest.com.tr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mcp.envest.com.tr/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SSL Genel Ayarlar
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Guvenlik Headerlari
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- Tum trafik tek sunucuya ---
    location / {
        proxy_pass http://mcp_server;
        proxy_http_version 1.1;

        # SSE / Streaming icin zorunlu
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standart proxy headerlari
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Authorization header ilet
        proxy_set_header Authorization $http_authorization;

        # Uzun sureli sorgular
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
