<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giris - Envest MCP Admin</title>
  <script data-cfasync="false" src="/static/tailwind.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
            mono: ['Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', 'monospace']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/admin.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-slate-100 font-sans min-h-screen antialiased">

  <!-- Animated Background -->
  <div class="login-grid-bg"></div>

  <!-- Glow Orbs -->
  <div class="login-glow-orb w-[500px] h-[500px] bg-emerald-500 -top-48 -right-48" style="position:fixed;"></div>
  <div class="login-glow-orb w-[400px] h-[400px] bg-blue-500 -bottom-32 -left-32" style="position:fixed;"></div>

  <!-- Login Container -->
  <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[420px]">
      <!-- Login Card -->
      <div class="glass-card rounded-2xl p-8 shadow-2xl">
        <!-- Brand -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-600 shadow-lg shadow-emerald-500/25 mb-4">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
          </div>
          <h1 class="text-2xl font-bold gradient-text-brand">Envest MCP</h1>
          <p class="text-slate-500 text-sm mt-1">Yonetim paneline giris yapin</p>
        </div>

        <!-- Error Message -->
        {% if error %}
        <div class="mb-6 px-4 py-3 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm font-medium flex items-center gap-2">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          {{ error }}
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" action="/login" class="space-y-5">
          <!-- Username -->
          <div>
            <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Kullanici Adi</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>
              <input type="text" id="username" name="username"
                     class="w-full pl-10 pr-4 py-3 rounded-xl bg-white/5 border border-white/10 text-slate-100 text-sm placeholder-slate-600 transition-all hover:border-white/20"
                     placeholder="admin" required autofocus
                     value="{{ username or '' }}">
            </div>
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Sifre</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
              </div>
              <input type="password" id="password" name="password"
                     class="w-full pl-10 pr-4 py-3 rounded-xl bg-white/5 border border-white/10 text-slate-100 text-sm placeholder-slate-600 transition-all hover:border-white/20"
                     placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit"
                  class="w-full py-3 px-4 rounded-xl text-sm font-semibold text-white btn-gradient-primary shadow-lg shadow-emerald-500/20 mt-2">
            Giris Yap
          </button>
        </form>
      </div>

      <!-- Footer -->
      <p class="text-center text-xs text-slate-600 mt-6">&copy; Envest MCP Admin Panel</p>
    </div>
  </div>

</body>
</html>
